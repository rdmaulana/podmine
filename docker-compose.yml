version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: podmine-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: podmine
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.0-alpine
    container_name: podmine-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
